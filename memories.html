<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>All Memories | Voyage Wall</title>
    <meta
      name="description"
      content="Browse every photo and message shared on Ella and Zyrus' Voyage Wall."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="./src/css/styles.css">
  </head>
  <body class="archive-page">
    <div class="app-shell">
      <nav class="top-nav" aria-label="Primary">
        <div class="top-nav__inner">
          <a class="top-nav__brand" href="./index.html#home">Ella &amp; Zyrus</a>
          <a class="top-nav__cta" href="./index.html#share">Share Moment</a>
        </div>
      </nav>

      <main class="archive-shell">
        <a class="archive-back-link" href="./index.html#wall">
          <span aria-hidden="true">&larr;</span>
          Back to Love Wall
        </a>

        <header class="archive-hero" aria-labelledby="archive-title">
          <p class="eyebrow eyebrow--dark" id="archive-memory-counter">Loading moments shared...</p>
          <h1 id="archive-title">Shared Moments</h1>
          <p>
            Every memory gathered from the celebration, shown newest first.
          </p>
        </header>

        <section class="archive-section" aria-label="Memory archive">
          <div class="archive-grid" id="archive-grid" aria-live="polite"></div>

          <div class="archive-actions">
            <button class="button button--primary" type="button" id="load-more-memories">
              Load More
            </button>
          </div>
        </section>
      </main>

      <dialog class="story-viewer" id="story-viewer" aria-labelledby="story-viewer-name">
        <button class="story-viewer__close" type="button" id="story-viewer-close" aria-label="Close memory viewer">
          &times;
        </button>

        <button class="story-viewer__nav story-viewer__nav--previous" type="button" id="story-viewer-previous" aria-label="Previous memory">
          &larr;
        </button>

        <article class="story-viewer__card">
          <img id="story-viewer-image" alt="">
          <div class="story-viewer__body">
            <p id="story-viewer-message"></p>
            <span id="story-viewer-name"></span>
          </div>
        </article>

        <button class="story-viewer__nav story-viewer__nav--next" type="button" id="story-viewer-next" aria-label="Next memory">
          &rarr;
        </button>
      </dialog>
    </div>

    <script type="module" src="./src/js/memories-archive.js"></script>
  </body>
</html>
